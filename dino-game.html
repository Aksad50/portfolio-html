<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Internet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .error-title {
    font-size: 72px;
    font-weight: bold;
    color: #595959;
    letter-spacing: -2px;
    margin-bottom: 0;
    line-height: 1;
  }
  .error-sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 30px;
    letter-spacing: 1px;
  }
  canvas { display: block; cursor: pointer; }
  .game-area { position: relative; width: 600px; }
  .top-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 4px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    font-weight: bold;
    color: #595959;
    letter-spacing: 3px;
  }
  .hi-label { color: #aaa; margin-right: 8px; }
</style>
</head>
<body>

<div class="error-title">No internet</div>
<div class="error-sub">Try checking the network cables, modem, and router</div>

<div class="game-area">
  <div class="top-bar">
    <span class="hi-label" id="hiLabel" style="display:none">HI</span>
    <span id="hiScore" style="display:none;margin-right:16px"></span>
    <span id="scoreDisplay">00000</span>
  </div>
  <canvas id="c" width="600" height="150"></canvas>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 150;
const GROUND = 106; // ground line y

let state = 'idle';
let score = 0, hiScore = 0;
let speed = 6, frame = 0;
let flashTimer = 0, prevScore = 0;
let obstacles = [], clouds = [];
let obsTimer = 60, cloudTimer = 150;

const dino = {
  x: 60, y: GROUND, vy: 0, onGround: true,
  ducking: false, animFrame: 0
};
const DINO_W = 44, DINO_H = 48;
const DINO_DUCK_W = 60, DINO_DUCK_H = 30;

// ---- Draw helpers ----
function px(x, y, w, h) { ctx.fillRect(x, y, w, h); }

function drawDino(x, y, af, ducking, dead) {
  ctx.fillStyle = '#535353';
  if (ducking) {
    const base = y + DINO_H - DINO_DUCK_H;
    // body
    px(x, base + 4, DINO_DUCK_W, DINO_DUCK_H - 10);
    // tail
    px(x - 10, base + 10, 14, 8); px(x - 16, base + 16, 10, 6);
    // head
    px(x + 38, base - 10, 26, 18); px(x + 52, base - 14, 12, 8);
    // eye
    ctx.fillStyle = '#fff'; px(x + 58, base - 10, 7, 7);
    ctx.fillStyle = '#535353'; px(x + 60, base - 8, 5, 5);
    // mouth
    ctx.fillStyle = '#fff'; px(x + 60, base + 4, 8, 3);
    ctx.fillStyle = '#535353';
    // legs
    const lf = af % 2;
    if (lf === 0) {
      px(x + 8, base + 20, 12, 8); px(x + 8, base + 26, 8, 10);
      px(x + 32, base + 20, 12, 8); px(x + 32, base + 26, 16, 4);
    } else {
      px(x + 8, base + 20, 12, 8); px(x + 8, base + 26, 14, 4);
      px(x + 32, base + 20, 12, 8); px(x + 32, base + 26, 8, 10);
    }
    return;
  }

  // Tail
  px(x - 8, y + 30, 12, 8); px(x - 14, y + 36, 10, 6);
  // Body
  px(x, y + 18, 44, 28);
  // Neck
  px(x + 30, y + 10, 14, 20);
  // Head
  px(x + 22, y, 26, 20); px(x + 38, y - 4, 14, 10);
  // Eye
  ctx.fillStyle = '#fff'; px(x + 42, y + 2, 8, 8);
  ctx.fillStyle = '#535353';
  if (dead) {
    // X eyes
    px(x + 42, y + 2, 3, 3); px(x + 47, y + 7, 3, 3);
    px(x + 47, y + 2, 3, 3); px(x + 42, y + 7, 3, 3);
  } else {
    px(x + 44, y + 4, 4, 4);
  }
  // Arm
  px(x + 20, y + 30, 10, 8); px(x + 14, y + 36, 8, 6);
  // Legs
  if (!dino.onGround && !dead) {
    px(x + 6, y + 46, 12, 16); px(x + 4, y + 58, 14, 5);
    px(x + 24, y + 46, 12, 12); px(x + 24, y + 54, 16, 5);
  } else if (dead) {
    px(x + 6, y + 46, 12, 14); px(x + 6, y + 56, 14, 5);
    px(x + 24, y + 46, 12, 14); px(x + 24, y + 56, 14, 5);
  } else {
    const lf = af % 2;
    if (lf === 0) {
      px(x + 6, y + 46, 12, 18); px(x + 6, y + 60, 16, 5);
      px(x + 24, y + 46, 12, 12); px(x + 20, y + 54, 14, 5);
    } else {
      px(x + 6, y + 46, 12, 12); px(x + 2, y + 54, 14, 5);
      px(x + 24, y + 46, 12, 18); px(x + 24, y + 60, 16, 5);
    }
  }
}

function drawCactus(obs) {
  ctx.fillStyle = '#535353';
  const x = obs.x, y = obs.y;
  if (obs.big) {
    px(x + 10, y, 14, obs.h);
    px(x, y + 20, 10, 20); px(x - 8, y + 14, 10, 14);
    px(x + 34, y + 18, 10, obs.h - 18); px(x + 24, y + 28, 12, 18);
    px(x + 50, y + 16, 10, obs.h - 16); px(x + 44, y + 24, 8, 18);
  } else {
    px(x + 8, y, 10, obs.h);
    px(x, y + 18, 8, 16); px(x - 6, y + 12, 8, 12);
    px(x + 18, y + 16, 8, 18); px(x + 24, y + 10, 8, 12);
  }
}

function drawBird(obs) {
  ctx.fillStyle = '#535353';
  const x = obs.x, y = obs.y;
  const wf = Math.floor(frame / 8) % 2;
  // Body
  px(x + 12, y + 8, 28, 14);
  // Beak
  px(x + 40, y + 12, 12, 5);
  // Tail
  px(x, y + 10, 14, 8); px(x - 6, y + 14, 8, 5);
  // Eye
  ctx.fillStyle = '#fff'; px(x + 30, y + 8, 8, 8);
  ctx.fillStyle = '#535353'; px(x + 32, y + 10, 6, 6);
  ctx.fillStyle = '#535353';
  // Wings
  if (wf === 0) {
    px(x + 12, y - 8, 22, 10); px(x + 8, y - 2, 8, 5);
  } else {
    px(x + 12, y + 20, 22, 10); px(x + 8, y + 24, 8, 5);
  }
  // Legs
  px(x + 16, y + 22, 5, 7); px(x + 26, y + 22, 5, 7);
}

function drawCloud(c) {
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.ellipse(c.x, c.y, 28, 9, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x - 14, c.y + 4, 16, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x + 14, c.y + 3, 18, 6, 0, 0, Math.PI * 2); ctx.fill();
}

function drawGround() {
  ctx.fillStyle = '#535353';
  ctx.fillRect(0, GROUND + DINO_H, W, 2);
  ctx.fillStyle = '#aaa';
  for (let i = 0; i < 14; i++) {
    const gx = ((i * 80) - (frame * speed * 0.5 % (W + 80)) + W * 2) % W;
    ctx.fillRect(gx, GROUND + DINO_H + 7, 25, 3);
    ctx.fillRect((gx + 40) % W, GROUND + DINO_H + 14, 12, 2);
  }
}

function drawMsg() {
  ctx.fillStyle = '#535353';
  ctx.textAlign = 'center';
  if (state === 'idle') {
    ctx.font = 'bold 14px "Courier New"';
    ctx.fillText('Press  Space  to  play', W / 2, GROUND - 14);
  } else if (state === 'dead') {
    ctx.font = 'bold 18px "Courier New"';
    ctx.fillText('G A M E   O V E R', W / 2, GROUND - 28);
    ctx.font = '11px "Courier New"';
    ctx.fillText('Press  Space  to  restart', W / 2, GROUND - 8);
  }
  ctx.textAlign = 'left';
}

function updateScore() {
  const s = String(Math.floor(score)).padStart(5, '0');
  const h = String(Math.floor(hiScore)).padStart(5, '0');
  const el = document.getElementById('scoreDisplay');
  el.textContent = s;
  if (flashTimer > 0) {
    el.style.color = Math.floor(flashTimer / 3) % 2 === 0 ? '#bbb' : '#535353';
    flashTimer--;
  } else { el.style.color = '#535353'; }
  if (hiScore > 0) {
    document.getElementById('hiLabel').style.display = 'inline';
    document.getElementById('hiScore').style.display = 'inline';
    document.getElementById('hiScore').textContent = h;
  }
}

function collides(obs) {
  const duck = dino.ducking && dino.onGround;
  const dw = duck ? DINO_DUCK_W : DINO_W;
  const dh = duck ? DINO_DUCK_H : DINO_H;
  const dy = dino.y + (DINO_H - dh);
  const m = 8;
  return (
    dino.x + m < obs.x + obs.w - m &&
    dino.x + dw - m > obs.x + m &&
    dy + m < obs.y + obs.h - m &&
    dy + dh - m > obs.y + m
  );
}

function spawnObs() {
  if (score > 400 && Math.random() < 0.28) {
    const ys = [GROUND - 36, GROUND - 10, GROUND - 62];
    obstacles.push({ x: W + 10, y: ys[Math.floor(Math.random() * ys.length)], w: 52, h: 30, type: 'bird' });
  } else {
    const big = Math.random() < 0.5;
    const h = big ? 62 : 46;
    obstacles.push({ x: W + 10, y: GROUND + DINO_H - h, w: big ? 54 : 34, h, type: 'cactus', big });
  }
}

function update() {
  if (state !== 'running') return;
  frame++;
  score += speed / 10;
  speed = 6 + score / 350;

  if (Math.floor(score / 100) > Math.floor(prevScore / 100)) flashTimer = 18;
  prevScore = score;

  dino.vy += 0.95;
  dino.y += dino.vy;
  if (dino.y >= GROUND) { dino.y = GROUND; dino.vy = 0; dino.onGround = true; }
  if (dino.onGround) dino.animFrame++;

  cloudTimer--;
  if (cloudTimer <= 0) {
    clouds.push({ x: W + 40, y: 25 + Math.random() * 35 });
    cloudTimer = 80 + Math.random() * 180;
  }
  clouds.forEach(c => c.x -= speed * 0.25);
  clouds = clouds.filter(c => c.x > -80);

  obsTimer--;
  if (obsTimer <= 0) {
    spawnObs();
    obsTimer = Math.max(28, 55 + Math.random() * 65 - speed * 4);
  }
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x > -80);

  if (obstacles.some(collides)) {
    state = 'dead';
    if (score > hiScore) hiScore = score;
  }
}

function draw() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);
  clouds.forEach(drawCloud);
  drawGround();
  obstacles.forEach(o => o.type === 'cactus' ? drawCactus(o) : drawBird(o));
  const duck = dino.ducking && dino.onGround;
  drawDino(dino.x, dino.y, Math.floor(dino.animFrame / 6), duck, state === 'dead');
  drawMsg();
  updateScore();
}

function jump() {
  if (dino.onGround) { dino.vy = -17; dino.onGround = false; }
}

function action() {
  if (state === 'idle') { state = 'running'; }
  else if (state === 'dead') {
    state = 'running'; score = 0; frame = 0; speed = 6;
    obstacles = []; clouds = []; obsTimer = 60; prevScore = 0;
    dino.y = GROUND; dino.vy = 0; dino.onGround = true; dino.ducking = false; dino.animFrame = 0;
  } else jump();
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); action(); }
  if (e.code === 'ArrowDown') { e.preventDefault(); dino.ducking = true; }
});
document.addEventListener('keyup', e => { if (e.code === 'ArrowDown') dino.ducking = false; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); action(); }, { passive: false });
canvas.addEventListener('click', action);

(function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
